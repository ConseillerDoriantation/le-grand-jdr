<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSP minimale (défense en profondeur, ne restreint ni script-src ni connect-src
       → ne peut pas casser Firebase/auth). Bloque <object>/<embed> et l'injection de <base>.
       Pour la CSP complète (script-src/connect-src/frame-src), voir docs/security.md :
       à déployer en test avant commit car une directive incomplète casse l'auth Google. -->
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'">

  <title>Grimorium</title>
  <link rel="icon" href="./favicon.ico" sizes="any">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Thème appliqué avant le rendu pour éviter le flash -->
  <script src="./assets/js/core/theme-boot.js"></script>

  <!-- Version du SDK Firebase centralisée ici (source unique). Pour bumper :
       changer le numéro à un seul endroit. Doit précéder tout <script type="module">.
       Les modules importent via les specifiers bare 'firebase/app|auth|firestore'. -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
    }
  }
  </script>

  <!-- Feuilles de style GLOBALES / partagées, chargées au boot (ordre = cascade).
       Conventions de nommage documentées dans assets/css/main.css.
       Les feuilles spécifiques aux pages sont chargées en lazy à la navigation
       via FEATURE_CSS dans assets/js/core/navigation.js. Garder ici uniquement
       le global et les petits composants transverses déclenchables hors route. -->
  <link rel="stylesheet" href="./assets/css/tokens.css">
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/auth.css">
  <link rel="stylesheet" href="./assets/css/adventure.css">
  <link rel="stylesheet" href="./assets/css/layout.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
  <link rel="stylesheet" href="./assets/css/features.css">
  <link rel="stylesheet" href="./assets/css/rich-text.css">
  <link rel="stylesheet" href="./assets/css/quick-view.css">
  <link rel="stylesheet" href="./assets/css/command-palette.css">
  <link rel="stylesheet" href="./assets/css/print.css">
</head>
<body>

<!-- ═══ SPRITE D'ICÔNES SVG ════════════════════════════════════════════════════
     Défini dans assets/img/icons.svg
     Utilisation : <svg class="nav-icon"><use href="./assets/img/icons.svg#icon-home"/></svg>
═════════════════════════════════════════════════════════════════════════════ -->

<!-- ═══ SPLASH DE BOOT (évite le flash auth pendant la restauration Firebase) ═ -->
<div id="boot-splash" class="app-splash" aria-hidden="true">
  <div class="app-splash-inner">
    <span class="app-splash-sigil"><img class="brand-logo" src="./assets/img/grimorium-logo.png" alt=""></span>
    <div class="app-splash-title">Grimorium</div>
    <div class="app-splash-spinner"></div>
  </div>
</div>

<!-- ═══ ÉCRAN D'AUTHENTIFICATION ════════════════════════════════════════════ -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-emblem">
      <span class="sigil"><img class="brand-logo" src="./assets/img/grimorium-logo.png" alt=""></span>
      <div class="auth-title">Grimorium</div>
      <div class="auth-subtitle">Portail des Aventuriers</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" type="button" data-action="auth-tab-login">Connexion</button>
      <button class="auth-tab"        type="button" data-action="auth-tab-register">Créer un compte</button>
    </div>

    <div id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" data-action="toggle-pw" data-target="login-password" aria-label="Afficher le mot de passe" title="Afficher / masquer">
            <svg class="pw-icon pw-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="pw-icon pw-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="button" class="btn-primary" data-action="login">Entrer dans le Monde</button>
      <div class="auth-forgot">
        <a href="#" data-action="forgot-pw">Mot de passe oublié ?</a>
      </div>
    </div>

    <div id="tab-register" style="display:none">
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="reg-pseudo" placeholder="Votre nom d'aventurier" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button type="button" class="btn-primary" data-action="register">Rejoindre l'Aventure</button>
    </div>

    <div class="auth-divider"><span>ou</span></div>

    <button type="button" class="btn-google" data-action="google-login">
      <svg class="btn-google-icon" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.96 10.71A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.96l3 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      <span>Continuer avec Google</span>
    </button>

    <div class="auth-error" id="auth-error" role="alert"></div>
  </div>
</div>

<!-- ═══ SÉLECTEUR D'AVENTURE ══════════════════════════════════════════════════ -->
<div id="adventure-screen" style="display:none">
  <div class="adv-picker-box">
    <div class="adv-picker-emblem">
      <span class="sigil"><img class="brand-logo" src="./assets/img/grimorium-logo.png" alt=""></span>
      <div class="adv-picker-title">Grimorium</div>
      <div class="adv-picker-tagline">Choisissez votre aventure</div>
    </div>
    <div id="adventure-picker-body" class="adv-picker-body">
      <div class="loading"><div class="spinner"></div> Chargement…</div>
    </div>
  </div>
</div>
